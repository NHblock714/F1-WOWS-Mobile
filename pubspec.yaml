name: f1_wows
description: F1 WOWS - World of Warships stats analyzer (mobile port)
publish_to: 'none'
version: 1.0.4+5

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  flutter_dotenv: ^5.1.0
  intl: ^0.19.0
  path_provider: ^2.1.0
  cached_network_image: ^3.3.0
  url_launcher: ^6.2.0
  qr_flutter: ^4.1.0
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - .env

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0E1A2E"
  adaptive_icon_foreground: "assets/icon.png"
  remove_alpha_ios: true
